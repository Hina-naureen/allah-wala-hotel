<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechFlow Support</title>
  <style>
    /* ── Reset & Variables ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #f0f4f8;
      --sidebar-bg:   #1e293b;
      --sidebar-text: #94a3b8;
      --sidebar-hi:   #6366f1;
      --primary:      #6366f1;
      --primary-dark: #4f46e5;
      --user-bubble:  #6366f1;
      --ai-bubble:    #ffffff;
      --surface:      #ffffff;
      --border:       #e2e8f0;
      --text:         #1e293b;
      --text-muted:   #64748b;
      --escalate:     #f59e0b;
      --escalate-bg:  #fffbeb;
      --escalate-bdr: #fde68a;
      --danger:       #ef4444;
      --green:        #10b981;
      --radius:       14px;
      --shadow:       0 4px 24px rgba(0,0,0,0.08);
      --font:         'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      display: flex;
      height: 100vh;
      overflow: hidden;
      color: var(--text);
    }

    /* ── Sidebar ────────────────────────────────────────────────────────── */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      padding: 24px 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px 24px;
      border-bottom: 1px solid #334155;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo-text { color: #fff; font-size: 16px; font-weight: 700; }
    .logo-sub  { color: var(--sidebar-text); font-size: 11px; margin-top: 1px; }

    /* Channel selector */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #475569;
      text-transform: uppercase;
      padding: 20px 20px 8px;
    }

    .channel-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      cursor: pointer;
      border-radius: 0;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      color: var(--sidebar-text);
      font-size: 14px;
      font-family: var(--font);
      transition: background .15s, color .15s;
    }

    .channel-btn:hover    { background: #273548; color: #e2e8f0; }
    .channel-btn.active   {
      background: rgba(99,102,241,.15);
      color: #fff;
      border-left: 3px solid var(--primary);
    }

    .channel-icon { font-size: 18px; width: 24px; text-align: center; }

    /* Status & info */
    .sidebar-footer {
      margin-top: auto;
      padding: 16px 20px;
      border-top: 1px solid #334155;
    }

    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 6px;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: .4; }
    }

    .status-text { color: var(--sidebar-text); font-size: 12px; }

    .session-id {
      font-size: 10px;
      color: #475569;
      margin-top: 6px;
      font-family: monospace;
      word-break: break-all;
    }

    /* ── Main Area ──────────────────────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: 0 1px 0 var(--border);
    }

    .header-left { display: flex; align-items: center; gap: 12px; }

    .agent-avatar {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--primary), #8b5cf6);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .agent-name  { font-weight: 700; font-size: 15px; }
    .agent-status {
      font-size: 12px;
      color: var(--green);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .header-right { display: flex; gap: 8px; }

    .btn-icon {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text-muted);
      font-family: var(--font);
      transition: all .15s;
    }

    .btn-icon:hover {
      background: var(--bg);
      color: var(--text);
      border-color: #cbd5e1;
    }

    .btn-new {
      background: var(--primary);
      color: #fff;
      border-color: transparent;
      font-weight: 600;
    }

    .btn-new:hover { background: var(--primary-dark); color: #fff; }

    /* ── Chat Messages ──────────────────────────────────────────────────── */
    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .chat-window::-webkit-scrollbar { width: 6px; }
    .chat-window::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }

    /* Date divider */
    .date-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-muted);
      font-size: 12px;
    }

    .date-divider::before,
    .date-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Message rows */
    .msg-row {
      display: flex;
      gap: 10px;
      animation: fade-in .25s ease;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: none; }
    }

    .msg-row.user {
      flex-direction: row-reverse;
    }

    /* Avatars */
    .msg-avatar {
      width: 34px; height: 34px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      align-self: flex-end;
    }

    .msg-avatar.ai   { background: linear-gradient(135deg, var(--primary), #8b5cf6); }
    .msg-avatar.user { background: #334155; font-size: 14px; color: #94a3b8; }

    /* Bubble wrapper */
    .msg-content { max-width: 68%; display: flex; flex-direction: column; gap: 4px; }
    .msg-row.user .msg-content { align-items: flex-end; }

    /* Bubble */
    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble.ai {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow);
      color: var(--text);
    }

    .bubble.user {
      background: var(--user-bubble);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    /* Meta row */
    .msg-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .msg-row.user .msg-meta { flex-direction: row-reverse; }

    /* Confidence badge */
    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
      letter-spacing: .3px;
    }

    .badge.high   { background: #dcfce7; color: #15803d; }
    .badge.medium { background: #fef9c3; color: #854d0e; }
    .badge.low    { background: #fee2e2; color: #b91c1c; }

    /* ── Escalation Banner ──────────────────────────────────────────────── */
    .escalation-banner {
      background: var(--escalate-bg);
      border: 1px solid var(--escalate-bdr);
      border-left: 4px solid var(--escalate);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      animation: fade-in .25s ease;
    }

    .escalation-banner.legal   { border-left-color: var(--danger); background: #fff1f2; border-color: #fecaca; border-left-color: var(--danger); }
    .escalation-banner.abusive { border-left-color: #f97316; background: #fff7ed; border-color: #fed7aa; }
    .escalation-banner.human   { border-left-color: var(--primary); background: #eef2ff; border-color: #c7d2fe; }

    .escalation-icon { font-size: 22px; flex-shrink: 0; margin-top: 1px; }

    .escalation-body { flex: 1; }

    .escalation-title {
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 4px;
      color: #92400e;
    }

    .escalation-banner.legal   .escalation-title { color: #b91c1c; }
    .escalation-banner.abusive .escalation-title { color: #9a3412; }
    .escalation-banner.human   .escalation-title { color: #3730a3; }

    .escalation-msg { font-size: 13px; line-height: 1.6; color: var(--text); }

    .ticket-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(0,0,0,.06);
      border-radius: 6px;
      padding: 3px 9px;
      font-size: 11px;
      font-weight: 700;
      font-family: monospace;
      margin-top: 8px;
      color: var(--text);
    }

    /* ── Typing Indicator ───────────────────────────────────────────────── */
    .typing-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .typing-bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      padding: 14px 18px;
      display: flex;
      gap: 5px;
      align-items: center;
      box-shadow: var(--shadow);
    }

    .dot {
      width: 7px; height: 7px;
      background: #94a3b8;
      border-radius: 50%;
      animation: bounce .9s infinite;
    }

    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .30s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-6px); }
    }

    /* ── Welcome Screen ─────────────────────────────────────────────────── */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--text-muted);
      text-align: center;
      padding: 40px;
    }

    .welcome-icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #eef2ff, #e0e7ff);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }

    .welcome h2 { font-size: 20px; color: var(--text); font-weight: 700; }
    .welcome p  { font-size: 14px; max-width: 360px; line-height: 1.6; }

    .quick-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .chip {
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text);
      transition: all .15s;
      font-family: var(--font);
    }

    .chip:hover {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
      transform: translateY(-1px);
    }

    /* ── Input Bar ──────────────────────────────────────────────────────── */
    .input-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 10px 10px 10px 16px;
      transition: border-color .2s, box-shadow .2s;
    }

    .input-row:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99,102,241,.12);
    }

    #messageInput {
      flex: 1;
      border: none;
      background: none;
      font-family: var(--font);
      font-size: 14px;
      color: var(--text);
      resize: none;
      max-height: 120px;
      min-height: 24px;
      line-height: 1.5;
      outline: none;
    }

    #messageInput::placeholder { color: #94a3b8; }

    .send-btn {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: var(--primary);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .15s, transform .1s;
    }

    .send-btn:hover    { background: var(--primary-dark); transform: scale(1.05); }
    .send-btn:active   { transform: scale(.96); }
    .send-btn:disabled { background: #c7d2fe; cursor: not-allowed; transform: none; }

    .send-btn svg { fill: #fff; }

    .input-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      text-align: center;
    }

    /* ── Error Toast ────────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1e293b;
      color: #fff;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 13px;
      opacity: 0;
      transition: all .3s;
      pointer-events: none;
      z-index: 9999;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Responsive ─────────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .sidebar  { display: none; }
      .msg-content { max-width: 85%; }
    }
  </style>
</head>
<body>

<!-- ── Sidebar ─────────────────────────────────────────────────────────── -->
<aside class="sidebar">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div>
      <div class="logo-text">TechFlow</div>
      <div class="logo-sub">Support Center</div>
    </div>
  </div>

  <div class="section-label">Channel</div>

  <button class="channel-btn active" data-channel="web" onclick="setChannel(this)">
    <span class="channel-icon">🌐</span> Web Chat
  </button>
  <button class="channel-btn" data-channel="email" onclick="setChannel(this)">
    <span class="channel-icon">📧</span> Email
  </button>
  <button class="channel-btn" data-channel="whatsapp" onclick="setChannel(this)">
    <span class="channel-icon">💬</span> WhatsApp
  </button>

  <div class="section-label" style="margin-top:12px;">Quick Actions</div>

  <button class="channel-btn" onclick="sendQuick('How do I reset my password?')">
    <span class="channel-icon">🔑</span> Password Reset
  </button>
  <button class="channel-btn" onclick="sendQuick('What integrations do you support?')">
    <span class="channel-icon">🔗</span> Integrations
  </button>
  <button class="channel-btn" onclick="sendQuick('How do I invite my team?')">
    <span class="channel-icon">👥</span> Invite Team
  </button>
  <button class="channel-btn" onclick="sendQuick('Is TechFlow GDPR compliant?')">
    <span class="channel-icon">🛡️</span> Security / GDPR
  </button>
  <button class="channel-btn" onclick="sendQuick('How do I export my data?')">
    <span class="channel-icon">📤</span> Export Data
  </button>

  <div class="sidebar-footer">
    <div class="status-text"><span class="status-dot"></span>Agent Online</div>
    <div class="session-id" id="sessionDisplay">session: —</div>
  </div>
</aside>

<!-- ── Main ─────────────────────────────────────────────────────────────── -->
<main class="main">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="agent-avatar">🤖</div>
      <div>
        <div class="agent-name">TechFlow Support AI</div>
        <div class="agent-status">
          <span style="width:6px;height:6px;background:#10b981;border-radius:50%;display:inline-block"></span>
          Online · Typically replies instantly
        </div>
      </div>
    </div>
    <div class="header-right">
      <button class="btn-icon" onclick="copyTranscript()">📋 Copy</button>
      <button class="btn-icon btn-new" onclick="newConversation()">＋ New Chat</button>
    </div>
  </header>

  <!-- Chat window -->
  <div class="chat-window" id="chatWindow">
    <!-- Welcome screen — hidden once chat starts -->
    <div class="welcome" id="welcomeScreen">
      <div class="welcome-icon">💬</div>
      <h2>How can we help you today?</h2>
      <p>Ask anything about TechFlow — account management, integrations, billing, and more.</p>
      <div class="quick-chips">
        <button class="chip" onclick="sendQuick('How do I reset my password?')">🔑 Reset password</button>
        <button class="chip" onclick="sendQuick('What integrations do you support?')">🔗 Integrations</button>
        <button class="chip" onclick="sendQuick('Is TechFlow GDPR compliant?')">🛡️ Data security</button>
        <button class="chip" onclick="sendQuick('How do I invite my team members?')">👥 Invite team</button>
        <button class="chip" onclick="sendQuick('How do I export my data?')">📤 Export data</button>
        <button class="chip" onclick="sendQuick('How do I enable two-factor authentication?')">🔐 Enable 2FA</button>
      </div>
    </div>
  </div>

  <!-- Input bar -->
  <div class="input-bar">
    <div class="input-row">
      <textarea
        id="messageInput"
        rows="1"
        placeholder="Type your message..."
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send (Enter)">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">Press <strong>Enter</strong> to send · <strong>Shift+Enter</strong> for new line</div>
  </div>

</main>

<!-- Toast -->
<div class="toast" id="toast"></div>


<script>
  /* ── Config ──────────────────────────────────────────────────────────── */
  const API_BASE = 'http://localhost:8000/api/v1';

  /* ── State ───────────────────────────────────────────────────────────── */
  let sessionId   = loadOrCreateSession();
  let channel     = 'web';
  let isLoading   = false;
  let messageLog  = [];    // for transcript copy

  /* ── Init ────────────────────────────────────────────────────────────── */
  document.getElementById('sessionDisplay').textContent = 'session: ' + sessionId.slice(0, 12) + '…';

  /* ── Session helpers ─────────────────────────────────────────────────── */
  function loadOrCreateSession() {
    let s = localStorage.getItem('support_session_id');
    if (!s) { s = crypto.randomUUID(); localStorage.setItem('support_session_id', s); }
    return s;
  }

  function newConversation() {
    sessionId = crypto.randomUUID();
    localStorage.setItem('support_session_id', sessionId);
    document.getElementById('sessionDisplay').textContent = 'session: ' + sessionId.slice(0, 12) + '…';

    const cw = document.getElementById('chatWindow');
    cw.innerHTML = '';
    cw.appendChild(buildWelcomeScreen());

    messageLog = [];
    showToast('New conversation started');
  }

  function buildWelcomeScreen() {
    const div = document.createElement('div');
    div.className = 'welcome';
    div.id = 'welcomeScreen';
    div.innerHTML = `
      <div class="welcome-icon">💬</div>
      <h2>How can we help you today?</h2>
      <p>Ask anything about TechFlow — account management, integrations, billing, and more.</p>
      <div class="quick-chips">
        <button class="chip" onclick="sendQuick('How do I reset my password?')">🔑 Reset password</button>
        <button class="chip" onclick="sendQuick('What integrations do you support?')">🔗 Integrations</button>
        <button class="chip" onclick="sendQuick('Is TechFlow GDPR compliant?')">🛡️ Data security</button>
        <button class="chip" onclick="sendQuick('How do I invite my team members?')">👥 Invite team</button>
        <button class="chip" onclick="sendQuick('How do I export my data?')">📤 Export data</button>
        <button class="chip" onclick="sendQuick('How do I enable two-factor authentication?')">🔐 Enable 2FA</button>
      </div>`;
    return div;
  }

  /* ── Channel ─────────────────────────────────────────────────────────── */
  function setChannel(btn) {
    document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    channel = btn.dataset.channel;
    showToast('Channel: ' + btn.textContent.trim());
  }

  /* ── Send message ────────────────────────────────────────────────────── */
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function sendQuick(text) {
    document.getElementById('messageInput').value = text;
    sendMessage();
  }

  async function sendMessage() {
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (!text || isLoading) return;

    // Hide welcome screen
    const ws = document.getElementById('welcomeScreen');
    if (ws) ws.remove();

    // Add date divider on first message
    const cw = document.getElementById('chatWindow');
    if (messageLog.length === 0) {
      cw.appendChild(buildDateDivider());
    }

    // Render user bubble
    appendMessage('user', text);
    messageLog.push({ role: 'user', text });

    // Clear input
    input.value = '';
    input.style.height = 'auto';

    // Show typing
    const typingEl = appendTyping();
    setLoading(true);

    try {
      const res = await fetch(`${API_BASE}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          session_id:     sessionId,
          message:        text,
          channel:        channel,
        }),
      });

      if (!res.ok) throw new Error(`Server error ${res.status}`);
      const data = await res.json();

      typingEl.remove();

      if (data.escalated) {
        appendEscalation(data);
      } else {
        appendMessage('ai', data.response, data.confidence, data.response_time_ms);
      }

      messageLog.push({ role: 'ai', text: data.response, escalated: data.escalated });

    } catch (err) {
      typingEl.remove();
      appendError(err.message);
    } finally {
      setLoading(false);
    }
  }

  /* ── DOM builders ────────────────────────────────────────────────────── */
  function appendMessage(role, text, confidence, ms) {
    const cw   = document.getElementById('chatWindow');
    const row  = document.createElement('div');
    row.className = `msg-row ${role}`;

    const isUser = role === 'user';
    const avatar = isUser ? '👤' : '🤖';
    const avatarClass = isUser ? 'user' : 'ai';
    const bubbleClass = isUser ? 'user' : 'ai';

    const confBadge = (!isUser && confidence != null)
      ? `<span class="badge ${confidenceLevel(confidence)}">${Math.round(confidence * 100)}% confident</span>`
      : '';

    const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const msMeta  = ms ? `· ${ms}ms` : '';

    row.innerHTML = `
      <div class="msg-avatar ${avatarClass}">${avatar}</div>
      <div class="msg-content">
        <div class="bubble ${bubbleClass}">${escapeHtml(text)}</div>
        <div class="msg-meta">
          <span>${timeStr} ${msMeta}</span>
          ${confBadge}
        </div>
      </div>`;

    cw.appendChild(row);
    scrollBottom();
    return row;
  }

  function appendEscalation(data) {
    const cw    = document.getElementById('chatWindow');
    const el    = document.createElement('div');
    const type  = escalationType(data.escalation_reason);

    el.className = `escalation-banner ${type.cls}`;

    const ticketHtml = data.escalation_ticket_id
      ? `<div class="ticket-chip">🎫 ${data.escalation_ticket_id}</div>`
      : '';

    el.innerHTML = `
      <div class="escalation-icon">${type.icon}</div>
      <div class="escalation-body">
        <div class="escalation-title">${type.title}</div>
        <div class="escalation-msg">${escapeHtml(data.response)}</div>
        ${ticketHtml}
      </div>`;

    cw.appendChild(el);
    scrollBottom();
    return el;
  }

  function appendTyping() {
    const cw  = document.getElementById('chatWindow');
    const row = document.createElement('div');
    row.className = 'typing-row';
    row.innerHTML = `
      <div class="msg-avatar ai">🤖</div>
      <div class="typing-bubble">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>`;
    cw.appendChild(row);
    scrollBottom();
    return row;
  }

  function appendError(msg) {
    const cw  = document.getElementById('chatWindow');
    const div = document.createElement('div');
    div.style.cssText = `
      text-align:center; color:#ef4444; font-size:13px;
      background:#fff1f2; border:1px solid #fecaca;
      border-radius:10px; padding:12px 16px;`;
    div.innerHTML = `⚠️ Could not reach the server — <strong>${escapeHtml(msg)}</strong>
      <br><small style="color:#94a3b8;margin-top:4px;display:block">
        Make sure the API is running at ${API_BASE}
      </small>`;
    cw.appendChild(div);
    scrollBottom();
  }

  function buildDateDivider() {
    const div = document.createElement('div');
    div.className = 'date-divider';
    div.textContent = new Date().toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
    return div;
  }

  /* ── Utilities ───────────────────────────────────────────────────────── */
  function escalationType(reason) {
    const map = {
      pricing_inquiry: { cls: '',       icon: '💰', title: 'Pricing Enquiry — Escalated to Sales' },
      legal_matter:    { cls: 'legal',  icon: '⚖️', title: 'Legal Matter — Escalated to Legal Team' },
      abusive_behavior:{ cls: 'abusive',icon: '🛑', title: 'Escalated to Senior Support' },
      no_answer_found: { cls: '',       icon: '🔍', title: 'Escalated to Specialist Team' },
      human_requested: { cls: 'human',  icon: '👤', title: 'Connecting You with a Human Agent' },
    };
    return map[reason] || { cls: '', icon: '🎫', title: 'Escalated to Support Team' };
  }

  function confidenceLevel(c) {
    if (c >= 0.90) return 'high';
    if (c >= 0.70) return 'medium';
    return 'low';
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/\n/g, '<br>');
  }

  function scrollBottom() {
    const cw = document.getElementById('chatWindow');
    cw.scrollTop = cw.scrollHeight;
  }

  function setLoading(state) {
    isLoading = state;
    document.getElementById('sendBtn').disabled = state;
    document.getElementById('messageInput').disabled = state;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function copyTranscript() {
    if (!messageLog.length) { showToast('No messages to copy'); return; }
    const text = messageLog
      .map(m => `[${m.role.toUpperCase()}] ${m.text}`)
      .join('\n\n');
    navigator.clipboard.writeText(text).then(() => showToast('Transcript copied!'));
  }
</script>
</body>
</html>
